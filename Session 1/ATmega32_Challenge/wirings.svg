<svg xmlns="http://www.w3.org/2000/svg" width="770" height="380" font-family="Arial, sans-serif">
    <rect width="100%" height="100%" fill="white"/>
    <text x="20" y="30" font-size="18" font-weight="bold" fill="#333">Wiring - USBASP to ATmega32 ISP</text>
    <g transform="translate(20, 50)">
    <rect x="0" y="0" width="730" height="40" fill="#f2f2f2" stroke="#ddd"/>\n<rect x="0" y="0" width="180" height="40" fill="none" stroke="#ddd"/>\n<text x="10" y="25" font-size="14" font-weight="bold" fill="#333">Component Pin</text>\n<rect x="180" y="0" width="150" height="40" fill="none" stroke="#ddd"/>\n<text x="190" y="25" font-size="14" font-weight="bold" fill="#333">Board Pin</text>\n<rect x="330" y="0" width="400" height="40" fill="none" stroke="#ddd"/>\n<text x="340" y="25" font-size="14" font-weight="bold" fill="#333">Notes</text>\n<rect x="0" y="40" width="730" height="40" fill="#ffffff" stroke="#ddd"/>\n<rect x="0" y="40" width="180" height="40" fill="none" stroke="#ddd"/>\n<text x="10" y="65" font-size="14" fill="#555">USBASP MOSI</text>\n<rect x="180" y="40" width="150" height="40" fill="none" stroke="#ddd"/>\n<text x="190" y="65" font-size="14" fill="#555">ATmega32 pin 6 (MOSI)</text>\n<rect x="330" y="40" width="400" height="40" fill="none" stroke="#ddd"/>\n<text x="340" y="65" font-size="14" fill="#555">ISP data line</text>\n<rect x="0" y="80" width="730" height="40" fill="#fafafa" stroke="#ddd"/>\n<rect x="0" y="80" width="180" height="40" fill="none" stroke="#ddd"/>\n<text x="10" y="105" font-size="14" fill="#555">USBASP MISO</text>\n<rect x="180" y="80" width="150" height="40" fill="none" stroke="#ddd"/>\n<text x="190" y="105" font-size="14" fill="#555">ATmega32 pin 7 (MISO)</text>\n<rect x="330" y="80" width="400" height="40" fill="none" stroke="#ddd"/>\n<text x="340" y="105" font-size="14" fill="#555">ISP data line</text>\n<rect x="0" y="120" width="730" height="40" fill="#ffffff" stroke="#ddd"/>\n<rect x="0" y="120" width="180" height="40" fill="none" stroke="#ddd"/>\n<text x="10" y="145" font-size="14" fill="#555">USBASP SCK</text>\n<rect x="180" y="120" width="150" height="40" fill="none" stroke="#ddd"/>\n<text x="190" y="145" font-size="14" fill="#555">ATmega32 pin 8 (SCK)</text>\n<rect x="330" y="120" width="400" height="40" fill="none" stroke="#ddd"/>\n<text x="340" y="145" font-size="14" fill="#555">ISP clock</text>\n<rect x="0" y="160" width="730" height="40" fill="#fafafa" stroke="#ddd"/>\n<rect x="0" y="160" width="180" height="40" fill="none" stroke="#ddd"/>\n<text x="10" y="185" font-size="14" fill="#555">USBASP RST</text>\n<rect x="180" y="160" width="150" height="40" fill="none" stroke="#ddd"/>\n<text x="190" y="185" font-size="14" fill="#555">ATmega32 pin 9 (RST)</text>\n<rect x="330" y="160" width="400" height="40" fill="none" stroke="#ddd"/>\n<text x="340" y="185" font-size="14" fill="#555">Reset line</text>\n<rect x="0" y="200" width="730" height="40" fill="#ffffff" stroke="#ddd"/>\n<rect x="0" y="200" width="180" height="40" fill="none" stroke="#ddd"/>\n<text x="10" y="225" font-size="14" fill="#555">USBASP VCC</text>\n<rect x="180" y="200" width="150" height="40" fill="none" stroke="#ddd"/>\n<text x="190" y="225" font-size="14" fill="#555">ATmega32 VCC</text>\n<rect x="330" y="200" width="400" height="40" fill="none" stroke="#ddd"/>\n<text x="340" y="225" font-size="14" fill="#555">Power</text>\n<rect x="0" y="240" width="730" height="40" fill="#fafafa" stroke="#ddd"/>\n<rect x="0" y="240" width="180" height="40" fill="none" stroke="#ddd"/>\n<text x="10" y="265" font-size="14" fill="#555">USBASP GND</text>\n<rect x="180" y="240" width="150" height="40" fill="none" stroke="#ddd"/>\n<text x="190" y="265" font-size="14" fill="#555">ATmega32 GND</text>\n<rect x="330" y="240" width="400" height="40" fill="none" stroke="#ddd"/>\n<text x="340" y="265" font-size="14" fill="#555">Ground</text>\n
    </g>
</svg>