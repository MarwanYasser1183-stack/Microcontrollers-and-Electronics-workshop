<svg xmlns="http://www.w3.org/2000/svg" width="770" height="300" font-family="Arial, sans-serif">
    <rect width="100%" height="100%" fill="white"/>
    <text x="20" y="30" font-size="18" font-weight="bold" fill="#333">Wiring - Button + LED</text>
    <g transform="translate(20, 50)">
    <rect x="0" y="0" width="730" height="40" fill="#f2f2f2" stroke="#ddd"/>\n<rect x="0" y="0" width="180" height="40" fill="none" stroke="#ddd"/>\n<text x="10" y="25" font-size="14" font-weight="bold" fill="#333">Component Pin</text>\n<rect x="180" y="0" width="150" height="40" fill="none" stroke="#ddd"/>\n<text x="190" y="25" font-size="14" font-weight="bold" fill="#333">Board Pin</text>\n<rect x="330" y="0" width="400" height="40" fill="none" stroke="#ddd"/>\n<text x="340" y="25" font-size="14" font-weight="bold" fill="#333">Notes</text>\n<rect x="0" y="40" width="730" height="40" fill="#ffffff" stroke="#ddd"/>\n<rect x="0" y="40" width="180" height="40" fill="none" stroke="#ddd"/>\n<text x="10" y="65" font-size="14" fill="#555">Button leg 1</text>\n<rect x="180" y="40" width="150" height="40" fill="none" stroke="#ddd"/>\n<text x="190" y="65" font-size="14" fill="#555">Pin 2</text>\n<rect x="330" y="40" width="400" height="40" fill="none" stroke="#ddd"/>\n<text x="340" y="65" font-size="14" fill="#555">One leg to digital pin</text>\n<rect x="0" y="80" width="730" height="40" fill="#fafafa" stroke="#ddd"/>\n<rect x="0" y="80" width="180" height="40" fill="none" stroke="#ddd"/>\n<text x="10" y="105" font-size="14" fill="#555">Button leg 2</text>\n<rect x="180" y="80" width="150" height="40" fill="none" stroke="#ddd"/>\n<text x="190" y="105" font-size="14" fill="#555">GND</text>\n<rect x="330" y="80" width="400" height="40" fill="none" stroke="#ddd"/>\n<text x="340" y="105" font-size="14" fill="#555">Other leg to GND — no external resistor needed</text>\n<rect x="0" y="120" width="730" height="40" fill="#ffffff" stroke="#ddd"/>\n<rect x="0" y="120" width="180" height="40" fill="none" stroke="#ddd"/>\n<text x="10" y="145" font-size="14" fill="#555">LED (+)</text>\n<rect x="180" y="120" width="150" height="40" fill="none" stroke="#ddd"/>\n<text x="190" y="145" font-size="14" fill="#555">Pin 7</text>\n<rect x="330" y="120" width="400" height="40" fill="none" stroke="#ddd"/>\n<text x="340" y="145" font-size="14" fill="#555">Through 220Ω resistor</text>\n<rect x="0" y="160" width="730" height="40" fill="#fafafa" stroke="#ddd"/>\n<rect x="0" y="160" width="180" height="40" fill="none" stroke="#ddd"/>\n<text x="10" y="185" font-size="14" fill="#555">LED (−)</text>\n<rect x="180" y="160" width="150" height="40" fill="none" stroke="#ddd"/>\n<text x="190" y="185" font-size="14" fill="#555">GND</text>\n<rect x="330" y="160" width="400" height="40" fill="none" stroke="#ddd"/>\n<text x="340" y="185" font-size="14" fill="#555">Short leg to GND</text>\n
    </g>
</svg>